version: '3.9'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - '5432:5432'
    networks:
      - agile_network

  web:
    # 1. On donne le nom de l'image sur Docker Hub + le dossier local de build pour GitHub
    image: ${DOCKERHUB_USERNAME}/agile_manager-web:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - django_staticfiles:/app/staticfiles
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - agile_network

  frontend:
    # 2. Pareil pour le frontend
    image: ${DOCKERHUB_USERNAME}/agile_manager-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - django_staticfiles:/usr/share/nginx/html/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - '80:8080'
      - '443:8443'
    environment:
      - VITE_API_URL=https://agilemanager.duckdns.org
    depends_on:
      - web
    networks:
      - agile_network

volumes:
  postgres_data:
  django_staticfiles:

networks:
  agile_network:
    driver: bridge
