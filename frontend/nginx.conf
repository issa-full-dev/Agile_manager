# 1. Bloc HTTP : Il écoute sur 8080 et redirige tout vers le HTTPS sécurisé
server {
    listen 8080;
    server_name agilemanager.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Bloc HTTPS : C'est ici que ton application s'exécute de manière sécurisée
server {
    listen 8443 ssl;
    server_name agilemanager.duckdns.org;

    # Chemins vers les certificats SSL générés par Certbot
    ssl_certificate /etc/letsencrypt/live/agilemanager.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agilemanager.duckdns.org/privkey.pem;

    # Optimisations de sécurité SSL standard
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Servir les fichiers statiques du Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers Django backend pour les API
    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy pour l'admin Django
    location /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
